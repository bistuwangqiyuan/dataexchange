[build]
  command = "pnpm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

# Functions配置
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Scheduled Functions (需要Pro计划)
# [[plugins]]
#   package = "@netlify/plugin-functions-core"
# 
# [functions.scheduled-match-orders]
#   schedule = "*/30 * * * *"  # 每30秒执行一次

# 安全头部
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://api.coingecko.com https://api.binance.com"

# 静态资源缓存
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API路由缓存控制
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# 重定向规则 - 顺序很重要！
# API请求路由到Astro SSR函数
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/ssr"
  status = 200
  force = true

# 其余路由由Astro Netlify适配器生成的_redirects处理（SSR模式，无需SPA回退）
